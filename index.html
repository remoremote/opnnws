<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Article Submission</title>
</head>
<body>
  <h1>Submit Your Article</h1>
  <form id="article-form">
    <label for="company-name">Company Name:</label>
    <input type="text" id="company-name" required>
    <br>
    <label for="company-website">Company Website:</label>
    <input type="url" id="company-website" required>
    <br>
    <label for="topic">Topic:</label>
    <select id="topic" required>
      <option value="">Select a topic</option>
      <option value="technology">Technology</option>
      <option value="business">Business</option>
      <!-- Add more options as needed -->
    </select>
    <br>
    <label for="article">Article:</label>
    <textarea id="article" required></textarea>
    <br>
    <button type="submit">Submit</button>
  </form>


  <br><br>
  <a href="/admin.html"><button>Go to Admin Page</button></a>
  <a href="/approved-articles.html"><button>Go to Approved Page</button></a>

  <script src="script.js"></script>
</body>
</html>
